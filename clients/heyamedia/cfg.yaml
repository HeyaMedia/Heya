# oapi-codegen configuration for the upstream heya.media client.
#
# Spec source: https://heya.media/api/openapi-3.0.json (server publishes
# the downgraded 3.0.3 form alongside the 3.1 master because oapi-codegen
# v2.4.x still chokes on 3.1's nullable-array shape).
#
# We commit the spec snapshot + generated code under clients/heyamedia/
# so the build is reproducible without network. `make gen-heyamedia-client`
# refreshes both.
package: heyamediaclient
output: clients/heyamedia/client.gen.go

generate:
  models: true
  client: true
  strict-server: false
  embedded-spec: false

output-options:
  skip-prune: false
  user-templates: {}

compatibility:
  always-prefix-enum-values: false
