<!--
  Shown after the browser parses index.html but before the Vue app mounts.
  Nuxt injects this inside <div id="__nuxt"> and removes it on hydration.
  Must be self-contained — no external assets, no JS, no Vue.
-->
<style>
  .heya-boot {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
    background: #0a0a12;
    color: #d6d4cc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    /* Fade in so reloads don't pop */
    animation: heya-boot-in 0.18s ease-out;
  }
  .heya-boot-mark {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: #7C6DD8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    box-shadow: 0 12px 32px rgba(124, 109, 216, 0.32);
    animation: heya-boot-pulse 2.4s ease-in-out infinite;
  }
  .heya-boot-bar {
    width: 96px;
    height: 2px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .heya-boot-bar::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: -40%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #fbbf24 50%, transparent);
    animation: heya-boot-slide 1.4s ease-in-out infinite;
  }
  @keyframes heya-boot-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes heya-boot-pulse {
    0%, 100% { transform: scale(1);    box-shadow: 0 12px 32px rgba(124, 109, 216, 0.30); }
    50%      { transform: scale(1.04); box-shadow: 0 16px 44px rgba(124, 109, 216, 0.50); }
  }
  @keyframes heya-boot-slide {
    0%   { transform: translateX(0); }
    100% { transform: translateX(350%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .heya-boot,
    .heya-boot-mark,
    .heya-boot-bar::after { animation: none; }
  }
</style>
<div class="heya-boot" aria-hidden="true">
  <div class="heya-boot-mark">H</div>
  <div class="heya-boot-bar"></div>
</div>
