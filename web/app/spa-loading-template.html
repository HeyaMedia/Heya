<!--
  Shown after the browser parses index.html but before the Vue app mounts.
  Nuxt injects this inside <div id="__nuxt"> and removes it on hydration.
  Must be self-contained — no external assets, no JS, no Vue.

  Theme-aware: <html data-theme> is already stamped by the time this paints —
  server-side by the Go SPA handler (heya_theme cookie) and client-side by
  the inline boot script in <head>. Values are literals (not var()) so the
  screen renders correctly even if the app stylesheets are still streaming.
-->
<style>
  .heya-boot {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
    background: #0a0a12;
    color: #d6d4cc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    /* Fade in so reloads don't pop */
    animation: heya-boot-in 0.18s ease-out;
  }
  html[data-theme="oled"] .heya-boot { background: #000; }
  html[data-theme="light"] .heya-boot { background: #f1eee7; color: #413d33; }
  .heya-boot-mark {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: #e6b94a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 700;
    color: #1a1408;
    letter-spacing: -0.02em;
    box-shadow: 0 12px 32px rgba(230, 185, 74, 0.32);
    animation: heya-boot-pulse 2.4s ease-in-out infinite;
  }
  html[data-theme="light"] .heya-boot-mark { background: #b88e2a; color: #1a1408; }
  .heya-boot-bar {
    width: min(240px, 58vw);
    height: 3px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  html[data-theme="light"] .heya-boot-bar { background: rgba(35, 30, 20, 0.10); }
  .heya-boot-progress {
    position: absolute;
    inset: 0 auto 0 0;
    width: 32%;
    border-radius: inherit;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(230, 185, 74, 0.28) 24%,
      #e6b94a 48%,
      #fff0b0 50%,
      #e6b94a 52%,
      rgba(230, 185, 74, 0.28) 76%,
      transparent 100%);
    filter: drop-shadow(0 0 5px rgba(230, 185, 74, 0.72));
    transform: translateX(-105%);
    will-change: transform;
    animation: heya-boot-slide 1.55s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
  }
  html[data-theme="light"] .heya-boot-progress {
    background: linear-gradient(90deg, transparent, rgba(184, 142, 42, 0.30), #b88e2a 48%, #6d5013 50%, #b88e2a 52%, rgba(184, 142, 42, 0.30), transparent);
    filter: drop-shadow(0 0 4px rgba(184, 142, 42, 0.48));
  }
  .heya-boot-status { margin-top: -16px; min-height: 16px; color: #77746c; font-size: 11px; }
  html[data-theme="light"] .heya-boot-status { color: #777064; }
  @keyframes heya-boot-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes heya-boot-pulse {
    0%, 100% { transform: scale(1);    box-shadow: 0 12px 32px rgba(230, 185, 74, 0.30); }
    50%      { transform: scale(1.04); box-shadow: 0 16px 44px rgba(230, 185, 74, 0.50); }
  }
  @keyframes heya-boot-slide {
    from { transform: translateX(-105%); }
    to   { transform: translateX(315%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .heya-boot,
    .heya-boot-mark,
    .heya-boot-progress { animation: none !important; }
    .heya-boot-progress { transform: translateX(105%); }
  }
</style>
<div class="heya-boot" role="status" aria-live="polite">
  <div class="heya-boot-mark">H</div>
  <div id="heya-boot-bar" class="heya-boot-bar">
    <div class="heya-boot-progress"></div>
  </div>
  <div id="heya-boot-status" class="heya-boot-status">Starting Heya…</div>
</div>
