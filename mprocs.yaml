# Dev supervisor for `make dev`. Four processes, one front door:
#
#   proxy  heya dev-proxy — STABLE front door on :8080. Reverse-proxies
#          /api/* + /jellyfin/* → :3050 and /* → Nuxt :3000.
#          Never restarts on a code save, so the stable origin and Vite HMR
#          socket survive Air rebuilds. Press `r` on this pane to rebuild it
#          after editing proxy code.
#   api    air — hot-reloads `heya serve --dev-backend` on :3050 (API + WS
#          through plaintext embedded Caddy; no Tailscale/remote access).
#   worker air — independently hot-reloads `heya worker`; in passive mode it
#          stays idle, while scripts/dev-local.sh activates it against heya_dev.
#   web    Nuxt/Vite dev server on :3000 (HMR).
#
# Open http://localhost:8080. Quit (q / Ctrl+C) tears all four down cleanly.
#
# Teardown discipline: the air panes are a `sh → go run → air → heya` chain,
# and `go run` does NOT forward SIGTERM to its child (verified empirically) —
# a targeted TERM dies at the wrapper and orphans air + the heya binary,
# which then keeps rebuilding on every file save. So the wrapped panes stop
# via send-keys Ctrl+C: the PTY delivers SIGINT to the whole foreground
# process group, air hears it directly and reaps its own child group.
# The proxy pane `exec`s a single binary, so a plain TERM works there.
# `make dev-stop` reaps any stack a hard kill left behind.
procs:
  proxy:
    # Builds through air-build.sh like the air panes: same repo-local Go
    # cache, and the build lock collapses the three identical startup builds
    # into one compile + three copies.
    shell: "HEYA_AIR_OUTPUT=tmp/heya-dev ./scripts/air-build.sh && exec tmp/heya-dev dev-proxy"
  api:
    # mkdir -p tmp: it's gitignored, so on a clean checkout it may not exist
    # yet when air races the proxy to build into it. (.air.toml keeps
    # clean_on_exit=false so air never deletes this shared dir on exit.)
    shell: "mkdir -p tmp && exec go run github.com/air-verse/air@latest"
    stop:
      send-keys: ["<C-c>"]
  worker:
    # Down by default — press `s` on the pane when background work is
    # actually needed. Most dev sessions are UI/API work where an idle
    # worker only adds a second air rebuild per save; and against the
    # prod-mirror DB there's nothing it should be consuming anyway.
    # NOTE: this does NOT replace passive mode — serve still inserts
    # manual River jobs into the SHARED DB (prod's worker executes them)
    # and passive mode is what suppresses schema/bootstrap writes and
    # enables the image proxy. See docs/development.md.
    autostart: false
    shell: "mkdir -p tmp && exec go run github.com/air-verse/air@latest -c .air.worker.toml"
    stop:
      send-keys: ["<C-c>"]
  web:
    shell: "cd web && exec bun run dev"
    stop:
      send-keys: ["<C-c>"]
