version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # The fingerprint blob (~3.7KB/file) is worker-internal: keep it
          # off every JSON surface (track_files rows are embedded verbatim in
          # album/artist detail responses) without forking slim row types.
          - column: "track_files.chromaprint"
            go_struct_tag: 'json:"-"'
          # Raw franchise-membership JSON blob. Kept off the wire (as []byte it
          # would base64-encode anyway) — the collection service unmarshals it,
          # resolves each part to a local movie, and returns a typed view.
          - column: "collections.parts"
            go_struct_tag: 'json:"-"'
          - db_type: "pg_catalog.interval"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Interval"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
              package: "pgvector"
