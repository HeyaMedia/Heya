[build]
  # Use a dedicated, size-bounded Go cache. Long-running Air sessions can
  # otherwise grow the global cache by tens of gigabytes.
  cmd = "./scripts/air-build.sh"
  # Dev topology: `heya dev-proxy` on :8080 is the stable plaintext front
  # door for Nuxt :3000 + this backend :3050. Air only restarts THIS backend;
  # the browser keeps one origin and Vite's HMR connection stays alive.
  # --dev-backend runs embedded Caddy without TLS and deliberately skips
  # production-only Tailscale/remote managers. Normal `heya serve` runs the
  # complete HTTPS/HTTP3 Caddy + tsnet ingress in-process.
  full_bin = "HEYA_PORT=3050 ./tmp/heya serve --dev-backend"
  delay = 1000
  exclude_dir = ["tmp", "web", "node_modules", "testdata", "fulldata", "data", "bin", ".git"]
  # heya.yaml is the live runtime config. UI/CLI writes to it (Tailscale
  # toggles, etc.) must not trigger an air rebuild, or the user's in-flight
  # state gets wiped mid-toggle. exclude_regex is matched against the
  # relative path so the anchored form catches it regardless of where air
  # reports it from.
  exclude_regex = ["_test\\.go$", "^heya\\.yaml$", "(^|/)heya\\.yaml$"]
  include_ext = ["go", "sql", "yaml"]
  kill_delay = 5000
  send_interrupt = true

[log]
  time = false

[misc]
  # MUST stay false: `tmp/` is shared scratch — the `heya dev-proxy` front
  # door also builds `tmp/heya-dev`. clean_on_exit=true would remove that
  # sibling binary whenever Air exits or restarts. Air only overwrites its own
  # `tmp/heya` on each build, so leaving the directory intact costs nothing.
  clean_on_exit = false
