[build]
  # Use a dedicated, size-bounded Go cache. Long-running Air sessions can
  # otherwise grow the global cache by tens of gigabytes.
  cmd = "./scripts/air-build.sh"
  # Dev topology: `heya dev-proxy` on :8080 is the stable front door (it
  # fronts Nuxt :3000 + this backend :3050 and owns the Tailscale node).
  # Air only restarts THIS backend; the front door and Nuxt stay alive, so
  # the tailnet node + browser WS/HMR sockets never see the door go away.
  # --dev-backend serves the API only and drives Tailscale over the
  # front-door control socket. Prod is unaffected — `heya serve` (no flag)
  # defaults to HEYA_PORT=8080 and runs tsnet in-process.
  full_bin = "HEYA_PORT=3050 ./tmp/heya serve --dev-backend"
  delay = 1000
  exclude_dir = ["tmp", "web", "node_modules", "testdata", "fulldata", "data", "bin", ".git"]
  # heya.yaml is the live runtime config. UI/CLI writes to it (Tailscale
  # toggles, etc.) must not trigger an air rebuild, or the user's in-flight
  # state gets wiped mid-toggle. exclude_regex is matched against the
  # relative path so the anchored form catches it regardless of where air
  # reports it from.
  exclude_regex = ["_test\\.go$", "^heya\\.yaml$", "(^|/)heya\\.yaml$"]
  include_ext = ["go", "sql", "yaml"]
  kill_delay = 5000
  send_interrupt = true

[log]
  time = false

[misc]
  # MUST stay false: `tmp/` is shared scratch — the `heya dev-proxy` front
  # door also builds `tmp/heya-dev` and owns the live `tmp/heya-dev-ts.sock`
  # control socket there. clean_on_exit=true would rm the whole dir when air
  # exits or its pane restarts, wiping the running proxy's socket and breaking
  # Tailscale control until the proxy restarts too. Air only overwrites its
  # own `tmp/heya` on each build, so leaving the dir intact costs nothing.
  clean_on_exit = false
