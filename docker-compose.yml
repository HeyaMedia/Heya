# Daily dev:   make db-up                 → Postgres only (:5440)
# Full stack:  docker compose up -d       → Postgres + Heya API + worker
#
# Both application services run the same published image with different
# commands. Update them together with `docker compose pull && docker compose
# up -d`. Don't run the API service alongside `make dev` — both want :8080.
x-heya-common: &heya-common
  image: ghcr.io/heyamedia/heya:latest
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    HEYA_DATABASE_URL: postgres://heya:heya@postgres:5432/heya?sslmode=disable
    # Run HeyaMetadata separately. This default reaches a host-side dev
    # instance on :3030; override HEYA_METADATA_URL for another deployment.
    HEYA_METADATA_URL: ${HEYA_METADATA_URL:-http://host.docker.internal:3030}
    # First-boot admin bootstrap (ignored once an admin user exists):
    # HEYA_ADMIN_USERNAME: admin
    # HEYA_ADMIN_EMAIL: admin@example.com
    # HEYA_ADMIN_PASSWORD: change-me
    # Declare libraries from env. Keep these values and media mounts on BOTH
    # API and worker by placing them in this shared block:
    # HEYA_LIBRARY_0_NAME: Movies
    # HEYA_LIBRARY_0_PATHS: /storage/Movies
    # HEYA_LIBRARY_0_TYPE: movie
    # Intel/AMD hardware transcode:
    # HEYA_HWACCEL: vaapi
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    # Shared state, images, caches, models, and persistent Tailscale identity.
    - ./data/heya:/data
    # The worker must see the same media paths recorded by the API.
    # - /path/to/media:/storage/Movies:ro
  # Hardware acceleration should also be shared by API + worker.
  # devices:
  #   - /dev/dri:/dev/dri
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: heya-postgres
    environment:
      POSTGRES_USER: heya
      POSTGRES_PASSWORD: heya
      POSTGRES_DB: heya
      # Keep the actual cluster in a child directory so the mounted parent can
      # contain a tracked marker file without making initdb reject PGDATA.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5440:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heya -d heya"]
      interval: 5s
      timeout: 3s
      retries: 12

  heya:
    <<: *heya-common
    container_name: heya
    ports:
      - "8080:8080/tcp"
      - "8080:8080/udp"

  heya-worker:
    <<: *heya-common
    container_name: heya-worker
    command: ["worker"]
