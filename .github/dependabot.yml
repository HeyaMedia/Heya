version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
      include: scope
    ignore:
      # onnxruntime_go is version-locked to the ORT shared library shipped in
      # the Dockerfiles: the onnxruntime-openvino wheel pins ORT 1.24.1 (C API
      # 24 = binding v1.27.x). A newer binding calls GetApi(>24) and fails to
      # init against the 1.24.1 lib ("Error setting ORT API base: 2"), which
      # breaks sonic-analysis. Bump by hand only, in lockstep with
      # ONNXRUNTIME_VERSION in the Dockerfiles. See docs/deployment.md.
      - dependency-name: "github.com/yalue/onnxruntime_go"
    groups:
      # Bundle minor + patch bumps into one PR per group; majors stay separate
      # so breaking changes still get individual review.
      waf-security:
        patterns:
          - "github.com/corazawaf/coraza-caddy*"
          - "github.com/corazawaf/coraza-coreruleset*"
        update-types:
          - minor
          - patch
      go-minor-patch:
        exclude-patterns:
          - "github.com/corazawaf/coraza-caddy*"
          - "github.com/corazawaf/coraza-coreruleset*"
        update-types:
          - minor
          - patch

  # Nuxt SPA (bun-managed)
  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: deps
      include: scope
    groups:
      bun-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
