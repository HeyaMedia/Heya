version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
      include: scope
    groups:
      # Bundle minor + patch bumps into one PR per group; majors stay separate
      # so breaking changes still get individual review.
      go-minor-patch:
        update-types:
          - minor
          - patch

  # Nuxt SPA (bun-managed)
  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: deps
      include: scope
    groups:
      bun-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
