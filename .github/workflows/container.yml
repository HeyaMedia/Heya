# Container build + push.
#
# Triggers only on `vX.Y.Z` tag push — main-branch pushes go through the
# regular CI (ci.yml) for fast feedback; tagging is what releases an image.
# This keeps GHCR free of half-baked SHAs and means `latest` only moves
# when a real version cuts.
#
# Image: ghcr.io/<owner>/<repo> (lowercased by docker/metadata-action).
# Auth: GITHUB_TOKEN — no manual secrets needed.

name: Container

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write   # publish to GHCR

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false   # tag builds should always run to completion

jobs:
  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git tag:
      #   v1.2.3  -> 1.2.3, 1.2, 1, latest
      # Also stamps OCI metadata (source repo, revision, title).
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache backend — survives across tag builds, keyed
          # by Dockerfile + dep manifests via buildx's content-addressed
          # layer hashes. Cuts cold-build time from ~10min to ~2min.
          cache-from: type=gha
          cache-to: type=gha,mode=max
