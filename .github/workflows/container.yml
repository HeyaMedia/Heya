# Container build + push.
#
# Triggers only on `vX.Y.Z` tag push — main-branch pushes go through the
# regular CI (ci.yml); tagging is what releases an image.
#
# Six image tags per release, all from ghcr.io/<owner>/<repo>:
#   :<ver>            base — CPU ONNX + Intel/AMD VAAPI/QSV transcode (amd64+arm64)
#   :<ver>-cuda       NVIDIA — CUDA/TensorRT ONNX + NVENC transcode (amd64)
#   :<ver>-openvino   Intel  — OpenVINO ONNX (Arc/iGPU) + QSV/VAAPI (amd64)
#   :<ver>-aio        base + private PostgreSQL/pgvector (amd64+arm64)
#   :<ver>-cuda-aio   NVIDIA + private PostgreSQL/pgvector (amd64)
#   :<ver>-openvino-aio Intel + private PostgreSQL/pgvector (amd64)
#
# The amd64 app bundle (Heya + pinned agent CLIs) is built once, uploaded as an
# artifact, and then packaged in parallel onto the CPU/CUDA/OpenVINO runtime
# images. Arm64 stays native on the GitHub-hosted ubuntu-24.04-arm runner and
# builds the full app image there, NO QEMU. CPU digests are merged into one
# multi-arch manifest.
# Auth: GITHUB_TOKEN — no manual secrets needed.

name: Container

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write   # publish to GHCR

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false   # tag builds should always run to completion

jobs:
  app-amd64:
    name: app amd64 artifact
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.img.outputs.image }}
      runtime_image: ${{ steps.img.outputs.runtime_image }}
    steps:
      - uses: actions/checkout@v7

      - name: Lowercase image ref
        id: img
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "runtime_image=${image}-runtime" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build Nuxt + Go and fetch the pinned agent CLIs once for amd64. The tiny
      # package jobs below put this same bundle onto CPU/CUDA/OpenVINO runtimes
      # without rebuilding frontend/backend or downloading the CLIs three times.
      - name: Build amd64 app bundle
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          target: binary-export
          platforms: linux/amd64
          outputs: type=local,dest=${{ runner.temp }}/heya-amd64
          cache-from: type=gha,scope=app-amd64
          cache-to: type=gha,mode=max,scope=app-amd64

      - name: Upload amd64 app bundle
        uses: actions/upload-artifact@v7
        with:
          name: app-amd64
          path: ${{ runner.temp }}/heya-amd64/
          if-no-files-found: error
          retention-days: 1

  base-amd64:
    name: base amd64
    needs: app-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download amd64 app bundle
        uses: actions/download-artifact@v8
        with:
          name: app-amd64
          path: ${{ runner.temp }}/package-amd64

      - name: Prepare package context
        run: |
          cp .docker/Dockerfile.package "${{ runner.temp }}/package-amd64/Dockerfile"
          ls -lh \
            "${{ runner.temp }}/package-amd64/heya" \
            "${{ runner.temp }}/package-amd64/agent-clis/claude" \
            "${{ runner.temp }}/package-amd64/agent-clis/codex/bin/codex"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI labels for the per-arch image. Tags are applied by the merge job.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.app-amd64.outputs.image }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ runner.temp }}/package-amd64
          file: ${{ runner.temp }}/package-amd64/Dockerfile
          platforms: linux/amd64
          build-args: |
            BASE_RUNTIME_IMAGE=${{ needs.app-amd64.outputs.runtime_image }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ needs.app-amd64.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-amd64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  base-arm64:
    name: base arm64
    runs-on: ubuntu-24.04-arm
    outputs:
      image: ${{ steps.img.outputs.image }}
      runtime_image: ${{ steps.img.outputs.runtime_image }}
    steps:
      - uses: actions/checkout@v7

      - name: Lowercase image ref
        id: img
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "runtime_image=${image}-runtime" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.image }}

      # Arm64 still builds natively on the arm runner. This keeps the arch
      # independent from amd64 artifacts and avoids QEMU/CGO surprises.
      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/arm64
          build-args: |
            BASE_RUNTIME_IMAGE=${{ steps.img.outputs.runtime_image }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.img.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=base-arm64
          cache-to: type=gha,mode=max,scope=base-arm64

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-arm64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: base manifest
    needs: [app-amd64, base-amd64, base-arm64]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ needs.app-amd64.outputs.image }}
      runtime_image: ${{ needs.app-amd64.outputs.runtime_image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version tags from the git tag: v1.2.3 -> 1.2.3, 1.2, 1, latest.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.app-amd64.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Assemble the multi-arch manifest from the per-arch digests and tag it.
      - name: Create + push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          image="${{ needs.app-amd64.outputs.image }}"

          tags=()
          while IFS= read -r tag; do
            tags+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          refs=()
          for digest_file in *; do
            refs+=("${image}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tags[@]}" "${refs[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect "${{ needs.app-amd64.outputs.image }}:${{ steps.meta.outputs.version }}"

  variants:
    name: ${{ matrix.variant }} (amd64)
    needs: app-amd64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cuda, openvino]
    steps:
      - uses: actions/checkout@v7
      - name: Download amd64 app bundle
        uses: actions/download-artifact@v8
        with:
          name: app-amd64
          path: ${{ runner.temp }}/package-${{ matrix.variant }}

      - name: Prepare package context
        run: |
          cp .docker/Dockerfile.package "${{ runner.temp }}/package-${{ matrix.variant }}/Dockerfile"
          ls -lh \
            "${{ runner.temp }}/package-${{ matrix.variant }}/heya" \
            "${{ runner.temp }}/package-${{ matrix.variant }}/agent-clis/claude" \
            "${{ runner.temp }}/package-${{ matrix.variant }}/agent-clis/codex/bin/codex"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same version tags as base, suffixed -cuda / -openvino. onlatest=true is
      # REQUIRED: the suffix flavor defaults to onlatest=false, which would leave
      # `latest` UNsuffixed — both variants would then publish a bare `:latest`
      # and clobber the base. With it, latest -> latest-cuda / latest-openvino.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.app-amd64.outputs.image }}
          flavor: suffix=-${{ matrix.variant }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Package the prebuilt amd64 app bundle onto the prebuilt GPU runtime —
      # amd64 only because CUDA/OpenVINO runtime images are x86_64.
      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ runner.temp }}/package-${{ matrix.variant }}
          file: ${{ runner.temp }}/package-${{ matrix.variant }}/Dockerfile
          platforms: linux/amd64
          build-args: |
            BASE_RUNTIME_IMAGE=${{ needs.app-amd64.outputs.runtime_image }}:latest-${{ matrix.variant }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  aio-build:
    name: ${{ matrix.variant }} aio (${{ matrix.arch }})
    needs: [merge, variants]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: cpu, arch: amd64, platform: linux/amd64, runner: ubuntu-latest, base_suffix: '' }
          - { variant: cpu, arch: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm, base_suffix: '' }
          - { variant: cuda, arch: amd64, platform: linux/amd64, runner: ubuntu-latest, base_suffix: '-cuda' }
          - { variant: openvino, arch: amd64, platform: linux/amd64, runner: ubuntu-latest, base_suffix: '-openvino' }
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This is deliberately an overlay on the completed release image. It
      # installs only PostgreSQL, pgvector, supervisor, and the init scripts;
      # neither Heya nor any CPU/GPU runtime is rebuilt.
      - name: Build + push aio by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile.aio
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ needs.merge.outputs.image }}:${{ needs.merge.outputs.version }}${{ matrix.base_suffix }}
          outputs: type=image,name=${{ needs.merge.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=aio-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=aio-${{ matrix.variant }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: aio-digest-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  aio-publish:
    name: ${{ matrix.variant }} aio manifest
    needs: [merge, aio-build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: cpu, tag_suffix: '-aio' }
          - { variant: cuda, tag_suffix: '-cuda-aio' }
          - { variant: openvino, tag_suffix: '-openvino-aio' }
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: aio-digest-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.merge.outputs.image }}
          flavor: suffix=${{ matrix.tag_suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create + push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          image="${{ needs.merge.outputs.image }}"

          tags=()
          while IFS= read -r tag; do
            tags+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          refs=()
          for digest_file in *; do
            refs+=("${image}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tags[@]}" "${refs[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect "${{ needs.merge.outputs.image }}:${{ needs.merge.outputs.version }}${{ matrix.tag_suffix }}"
