# Container build + push.
#
# Triggers only on `vX.Y.Z` tag push — main-branch pushes go through the
# regular CI (ci.yml); tagging is what releases an image.
#
# Three images per release, all from ghcr.io/<owner>/<repo>:
#   :<ver>            base — CPU ONNX + Intel/AMD VAAPI/QSV transcode (amd64+arm64)
#   :<ver>-cuda       NVIDIA — CUDA/TensorRT ONNX + NVENC transcode (amd64)
#   :<ver>-openvino   Intel  — OpenVINO ONNX (Arc/iGPU) + QSV/VAAPI (amd64)
#
# The base is built NATIVELY per-arch — amd64 on ubuntu-latest, arm64 on the
# GitHub-hosted ubuntu-24.04-arm runner (free for public repos), NO QEMU. Each
# arch is pushed by digest, then a merge job assembles one multi-arch manifest
# with the version tags. The GPU variants build FROM that merged base.
# Auth: GITHUB_TOKEN — no manual secrets needed.

name: Container

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write   # publish to GHCR

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false   # tag builds should always run to completion

jobs:
  base:
    name: base ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    outputs:
      image: ${{ steps.img.outputs.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, platform: linux/amd64, runner: ubuntu-latest }
          - { arch: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v7

      # GHCR refs must be lowercase, but github.repository can be mixed-case
      # (e.g. HeyaMedia/Heya).
      - name: Lowercase image ref
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI labels for the per-arch image. Tags are applied by the merge job.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.image }}

      # Native build for this runner's arch — no emulation. Pushed by digest
      # only (no tag); the merge job assembles the tagged manifest list. Cache
      # is scoped per-arch so the two runners don't clobber each other.
      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.img.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: base manifest
    needs: base
    runs-on: ubuntu-latest
    outputs:
      image: ${{ needs.base.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version tags from the git tag: v1.2.3 -> 1.2.3, 1.2, 1, latest.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.base.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Assemble the multi-arch manifest from the per-arch digests and tag it.
      - name: Create + push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.base.outputs.image }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect "${{ needs.base.outputs.image }}:${{ steps.meta.outputs.version }}"

  variants:
    name: ${{ matrix.variant }} (amd64)
    needs: merge
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cuda, openvino]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same version tags as base, suffixed -cuda / -openvino. onlatest=true is
      # REQUIRED: the suffix flavor defaults to onlatest=false, which would leave
      # `latest` UNsuffixed — both variants would then publish a bare `:latest`
      # and clobber the base. With it, latest -> latest-cuda / latest-openvino.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.merge.outputs.image }}
          flavor: suffix=-${{ matrix.variant }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # FROM the merged base manifest (by version tag pushed above) — amd64 only
      # (the GPU runtimes are x86_64). Reuses the base's layers, so it's a thin
      # build (no frontend/Go recompile).
      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.variant }}
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ needs.merge.outputs.image }}:${{ needs.merge.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
