name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────
  # Frontend: type-check the Nuxt SPA and audit npm-side deps.
  # ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Vue + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lock', 'web/tools/*/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Guard against trustedDependencies escape hatch
        run: |
          if grep -q '"trustedDependencies"' web/package.json; then
            echo "::error::web/package.json introduces \`trustedDependencies\`."
            echo "This field lets listed packages run install/postinstall scripts."
            echo "Confirm you actually need this and update this guard intentionally."
            exit 1
          fi

      - name: Install deps (frozen lockfile)
        working-directory: web
        run: bun install --frozen-lockfile

      # Go is set up here (not just in go-static) so this job can regenerate
      # the OpenAPI spec and committed TypeScript contract. Mirrors the
      # sqlc-drift check: if a Huma handler changed and the generated artifacts
      # weren't refreshed, the build fails here.
      - name: Setup Go (for openapi-spec CLI)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate API spec
        run: make gen-api-client

      - name: Verify API spec is up to date
        run: |
          if ! git diff --quiet -- web/shared/api.openapi.json web/shared/api/; then
            echo "::error::OpenAPI spec or generated TypeScript contract is out of date."
            echo "Run 'make gen-api-client' locally and commit the result."
            git diff --stat -- web/shared/api.openapi.json web/shared/api/
            exit 1
          fi

      - name: Type-check (TypeScript 7 + Vue SFCs)
        working-directory: web
        run: bun run typecheck

      # Advisory only: surfaces known CVEs (mostly transitive build-time deps
      # like vite/esbuild/tar that never ship to users) without blocking the
      # build. We bump deps promptly, so this is a heads-up, not a gate.
      - name: Audit npm deps for known CVEs
        working-directory: web
        continue-on-error: true
        run: bun audit

  # ────────────────────────────────────────────────────────────────
  # Backend static checks: format, lint, build, sqlc drift.
  # ────────────────────────────────────────────────────────────────
  go-static:
    name: Go (lint + build + sqlc drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build outputs
        uses: actions/cache@v6
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --new-from-rev=origin/${{ github.base_ref || 'main' }} --timeout=5m

      - name: Compile
        run: go build -o /dev/null ./...

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Verify sqlc generated code is up to date
        run: |
          sqlc generate
          if ! git diff --quiet internal/database/sqlc/; then
            echo "::error::sqlc-generated code is out of date."
            echo "Run 'sqlc generate' locally and commit the result."
            git diff --stat internal/database/sqlc/
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────
  # Backend tests: race-detector enabled, real Postgres.
  # ────────────────────────────────────────────────────────────────
  go-test:
    name: Go (test -race)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image, not stock postgres:17 — migration 00015_track_facets
        # does `CREATE EXTENSION vector;` for sonic-similarity centroids and
        # the stock image doesn't ship it. Matches docker-compose.yml.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: heya
          POSTGRES_PASSWORD: heya
          POSTGRES_DB: heya
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U heya -d heya"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://heya:heya@localhost:5440/heya?sslmode=disable
      HEYA_DATABASE_URL: postgres://heya:heya@localhost:5440/heya?sslmode=disable
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build outputs
        uses: actions/cache@v6
        with:
          path: ~/.cache/go-build
          key: go-test-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-test-${{ runner.os }}-
            go-build-${{ runner.os }}-

      # Exercise the production migration boundary: Heya owns both its Goose
      # schema and River's queue schema. Applying only the former leaves clean
      # databases without river_job and makes queue integration tests invalid.
      - name: Apply application and River migrations
        run: go run ./cmd/heya migrate up

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

  # ────────────────────────────────────────────────────────────────
  # Supply chain: known CVEs in Go imports + multi-ecosystem scan.
  # ────────────────────────────────────────────────────────────────
  security:
    name: Security (govulncheck + OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache govulncheck binary
        uses: actions/cache@v6
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-v1

      - name: govulncheck (Go vuln DB vs import graph)
        run: |
          if [ ! -x "$HOME/go/bin/govulncheck" ]; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
          fi
          "$HOME/go/bin/govulncheck" ./...

      # Advisory only: known CVEs across npm + Go deps (incl. ones with no
      # upstream fix yet, e.g. disintegration/imaging). Reported as a warning
      # so a freshly-disclosed transitive CVE doesn't wedge main. govulncheck
      # above stays a hard gate — it only fails on Go vulns actually reachable
      # from our code.
      - name: OSV-Scanner (npm + Go via OSV.dev)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            ./
